<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700" font-family="Times New Roman, serif">
<style>.ttl{font-size:16px;font-weight:bold}.lbl{font-size:12px}.it{font-style:italic;font-size:11px}.s{font-size:9px}</style>
<rect width="1080" height="700" fill="white"/>
<text x="540" y="32" text-anchor="middle" font-size="21" font-weight="bold">End-to-end evidence flow</text>
<!-- Supplier (left) -->
<rect x="30" y="66" width="220" height="84" fill="none" stroke="black" stroke-width="1.5"/>
<text x="140" y="96" text-anchor="middle" class="ttl">Supplier (Party A)</text>
<text x="140" y="118" text-anchor="middle" class="lbl">private ledger,</text>
<text x="140" y="136" text-anchor="middle" class="lbl">invoice and field keys</text>
<!-- Buyer (right) -->
<rect x="830" y="66" width="220" height="84" fill="none" stroke="black" stroke-width="1.5"/>
<text x="940" y="96" text-anchor="middle" class="ttl">Buyer (Party B)</text>
<text x="940" y="118" text-anchor="middle" class="lbl">private ledger,</text>
<text x="940" y="136" text-anchor="middle" class="lbl">payment and field keys</text>
<!-- shared value (between the two, clear of boxes) -->
<line x1="250" y1="100" x2="830" y2="100" stroke="black" stroke-width="1.1" stroke-dasharray="5,4"/>
<text x="540" y="92" text-anchor="middle" class="it">shared value S (ECDH) gives linkage tags and per-field keys</text>
<!-- public medium box -->
<rect x="180" y="330" width="720" height="120" fill="none" stroke="black" stroke-width="2"/>
<text x="540" y="356" text-anchor="middle" class="ttl">Public medium (append-only, timestamped)</text>
<rect x="210" y="372" width="290" height="60" fill="none" stroke="black" stroke-width="1.1"/>
<text x="355" y="395" text-anchor="middle" font-size="13" font-weight="bold">Invoice note</text>
<text x="282" y="416" text-anchor="start" class="lbl">field commitments, L<tspan class="s" baseline-shift="-25%">inv</tspan>, sig, t<tspan class="s" baseline-shift="-25%">1</tspan></text>
<rect x="580" y="372" width="290" height="60" fill="none" stroke="black" stroke-width="1.1"/>
<text x="725" y="395" text-anchor="middle" font-size="13" font-weight="bold">Payment note</text>
<text x="625" y="416" text-anchor="start" class="lbl">commitments, L<tspan class="s" baseline-shift="-25%">pay</tspan>, ref, sig, t<tspan class="s" baseline-shift="-25%">2</tspan></text>
<line x1="500" y1="402" x2="580" y2="402" stroke="black" stroke-width="1.1" marker-end="url(#a)"/>
<text x="540" y="472" text-anchor="middle" class="it">private linkage</text>
<!-- publish invoice: from supplier bottom, down its OWN column to medium top-left corner, clear of text -->
<polyline points="140,150 140,300 300,300 300,372" fill="none" stroke="black" stroke-width="1.1" marker-end="url(#a)"/>
<text x="150" y="250" text-anchor="start" class="lbl">publish invoice</text>
<!-- publish payment: mirror on right -->
<polyline points="940,150 940,300 780,300 780,372" fill="none" stroke="black" stroke-width="1.1" marker-end="url(#a)"/>
<text x="930" y="250" text-anchor="end" class="lbl">publish payment</text>
<!-- Auditor box (bottom center) -->
<rect x="390" y="560" width="300" height="92" fill="none" stroke="black" stroke-width="1.5"/>
<text x="540" y="588" text-anchor="middle" class="ttl">Auditor</text>
<text x="540" y="610" text-anchor="middle" class="lbl">recomputes disclosed-field tag,</text>
<text x="540" y="628" text-anchor="middle" class="lbl">checks linkage and timestamps</text>
<!-- read public tags: medium bottom to auditor top (straight, clear) -->
<line x1="540" y1="450" x2="540" y2="560" stroke="black" stroke-width="1.1" marker-end="url(#a)"/>
<text x="552" y="512" text-anchor="start" class="it">read public tags</text>
<!-- signed disclosure: supplier down its column, then along far-left, into auditor left side (no crossing of boxes/text) -->
<polyline points="60,150 60,606 390,606" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#a)"/>
<text x="70" y="350" text-anchor="start" class="it">signed per-field</text>
<text x="70" y="365" text-anchor="start" class="it">disclosure (key + value)</text>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="black"/></marker></defs>
</svg>
