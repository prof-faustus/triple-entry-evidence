<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="730" viewBox="0 0 1120 730" font-family="Times New Roman, serif">
<style>.lbl{font-size:13px}.ttl{font-size:15px;font-weight:bold}.it{font-style:italic;font-size:12px}.s{font-size:10px}</style>
<rect width="1120" height="730" fill="white"/>
<text x="560" y="32" text-anchor="middle" font-size="21" font-weight="bold">Per-field key derivation and scoped disclosure</text>

<!-- S -->
<rect x="450" y="52" width="220" height="46" fill="none" stroke="black" stroke-width="1.4"/>
<text x="560" y="74" text-anchor="middle" class="ttl">Shared value S</text>
<text x="560" y="91" text-anchor="middle" class="lbl">(ECDH, both parties)</text>
<!-- master key box -->
<rect x="440" y="124" width="240" height="46" fill="none" stroke="black" stroke-width="1.4"/>
<text x="508" y="146" text-anchor="start" class="ttl">K<tspan class="s" baseline-shift="-25%">master</tspan> = HKDF(S)</text>
<text x="560" y="163" text-anchor="middle" class="lbl">per-note master key</text>
<line x1="560" y1="98" x2="560" y2="124" stroke="black" stroke-width="1.2" marker-end="url(#a)"/>

<!-- derivation caption: own row, left-anchored, clear -->
<text x="60" y="196" text-anchor="start" class="it">Derivation:  K<tspan class="s" baseline-shift="-25%">field</tspan> = HKDF( K<tspan class="s" baseline-shift="-25%">master</tspan>, "commit" || note<tspan class="s" baseline-shift="-25%">id</tspan> || field<tspan class="s" baseline-shift="-25%">label</tspan> )</text>

<!-- distribution bus: stem down from master-key box to bus, one horizontal bus, even straight drops -->
<line x1="560" y1="170" x2="560" y2="222" stroke="black" stroke-width="1"/>
<line x1="130" y1="222" x2="990" y2="222" stroke="black" stroke-width="1"/>
<g stroke="black" stroke-width="1" fill="none">
<line x1="130" y1="222" x2="130" y2="262" marker-end="url(#a)"/>
<line x1="338" y1="222" x2="338" y2="262" marker-end="url(#a)"/>
<line x1="546" y1="222" x2="546" y2="262" marker-end="url(#a)"/>
<line x1="782" y1="222" x2="782" y2="262" marker-end="url(#a)"/>
<line x1="990" y1="222" x2="990" y2="262" marker-end="url(#a)"/>
</g>

<!-- per-field key boxes (top y=262) -->
<g>
<rect x="40"  y="262" width="180" height="58" fill="none" stroke="black"/><text x="92"  y="286" text-anchor="start" class="ttl">K<tspan class="s" baseline-shift="-25%">field</tspan>[Gross]</text><text x="130" y="307" text-anchor="middle" class="lbl">opens Gross only</text>
<rect x="248" y="262" width="180" height="58" fill="none" stroke="black"/><text x="305" y="286" text-anchor="start" class="ttl">K<tspan class="s" baseline-shift="-25%">field</tspan>[Tax]</text><text x="338" y="307" text-anchor="middle" class="lbl">opens Tax only</text>
<rect x="456" y="262" width="180" height="58" fill="none" stroke="black"/><text x="514" y="286" text-anchor="start" class="ttl">K<tspan class="s" baseline-shift="-25%">field</tspan>[Due]</text><text x="546" y="307" text-anchor="middle" class="lbl">opens Due only</text>
<rect x="692" y="262" width="180" height="58" fill="none" stroke="black"/><text x="748" y="286" text-anchor="start" class="ttl">K<tspan class="s" baseline-shift="-25%">field</tspan>[InvID]</text><text x="782" y="307" text-anchor="middle" class="lbl">opens InvID only</text>
<rect x="900" y="262" width="180" height="58" fill="none" stroke="black"/><text x="958" y="286" text-anchor="start" class="ttl">K<tspan class="s" baseline-shift="-25%">field</tspan>[ ... ]</text><text x="990" y="307" text-anchor="middle" class="lbl">one key per field</text>
</g>

<!-- commitment caption: own row, left-anchored, clear of arrows -->
<text x="60" y="352" text-anchor="start" class="it">Commitment:  C(x) = SHA256( K<tspan class="s" baseline-shift="-25%">field</tspan> || field<tspan class="s" baseline-shift="-25%">label</tspan> || x ),  published on the medium</text>

<!-- straight drops key->commitment (start y=320 below boxes, end y=386 at commitment top); these are clear of the caption at y=352 because caption sits left of x=130? caption spans ~60..600. Drops at x=130,338,546 would cross caption baseline. So START drops at y=362 (below caption) -->
<g stroke="black" stroke-width="1" fill="none">
<line x1="130" y1="362" x2="130" y2="386" marker-end="url(#a)"/>
<line x1="338" y1="362" x2="338" y2="386" marker-end="url(#a)"/>
<line x1="546" y1="362" x2="546" y2="386" marker-end="url(#a)"/>
<line x1="782" y1="320" x2="782" y2="386" marker-end="url(#a)"/>
<line x1="990" y1="320" x2="990" y2="386" marker-end="url(#a)"/>
</g>
<!-- short connector stubs from box bottom to drop start for the left three (so the line is visually continuous but breaks around the caption) -->
<g stroke="black" stroke-width="1" fill="none">
<line x1="130" y1="320" x2="130" y2="338"/>
<line x1="338" y1="320" x2="338" y2="338"/>
<line x1="546" y1="320" x2="546" y2="338"/>
</g>

<!-- commitments row (top y=386) -->
<g>
<rect x="40"  y="386" width="180" height="40" fill="none" stroke="black" stroke-dasharray="3,3"/><text x="130" y="411" text-anchor="middle" class="lbl">C(Gross)</text>
<rect x="248" y="386" width="180" height="40" fill="none" stroke="black" stroke-dasharray="3,3"/><text x="338" y="411" text-anchor="middle" class="lbl">C(Tax)</text>
<rect x="456" y="386" width="180" height="40" fill="none" stroke="black" stroke-dasharray="3,3"/><text x="546" y="411" text-anchor="middle" class="lbl">C(Due)</text>
<rect x="692" y="386" width="180" height="40" fill="none" stroke="black" stroke-dasharray="3,3"/><text x="782" y="411" text-anchor="middle" class="lbl">C(InvID)</text>
<rect x="900" y="386" width="180" height="40" fill="none" stroke="black" stroke-dasharray="3,3"/><text x="990" y="411" text-anchor="middle" class="lbl">C( ... )</text>
</g>

<!-- disclosure envelope -->
<rect x="220" y="476" width="680" height="200" fill="none" stroke="black" stroke-width="1.8"/>
<text x="560" y="504" text-anchor="middle" font-size="15" font-weight="bold">Signed disclosure envelope (to one named auditor)</text>
<text x="348" y="532" text-anchor="start" class="lbl">Sign( sk,  note<tspan class="s" baseline-shift="-25%">id</tspan> || field<tspan class="s" baseline-shift="-25%">label</tspan> || hash(K<tspan class="s" baseline-shift="-25%">field</tspan>) ||</text>
<text x="360" y="552" text-anchor="start" class="lbl">verifier<tspan class="s" baseline-shift="-25%">id</tspan> || engagement<tspan class="s" baseline-shift="-25%">id</tspan> || purpose || expiry || nonce )</text>
<line x1="240" y1="580" x2="880" y2="580" stroke="black" stroke-width="0.6" stroke-dasharray="2,2"/>
<text x="370" y="604" text-anchor="start" class="it">releases ONE field key (e.g. K<tspan class="s" baseline-shift="-25%">field</tspan>[Gross]) and its value</text>
<text x="560" y="624" text-anchor="middle" class="it">auditor recomputes C(Gross); all other fields stay locked</text>
<text x="560" y="648" text-anchor="middle" class="lbl">verification rejects on wrong verifier, wrong engagement, or after expiry</text>
<!-- only-Gross disclosure arrow: orthogonal, down C(Gross) column then right into envelope top-left -->
<polyline points="130,426 130,452 280,452 280,476" fill="none" stroke="black" stroke-width="1.1" marker-end="url(#a)"/>
<text x="138" y="446" text-anchor="start" class="it">only Gross released</text>

<defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="black"/></marker></defs>
</svg>
